---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: seerr
  namespace: media
spec:
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    - name: sonarr
      namespace: media
    - name: radarr
      namespace: media
  interval: 15m
  chart:
    spec:
      chart: ./charts/seerr-chart
      version: 3.4.2
      sourceRef:
        kind: GitRepository
        name: seerr-source
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    fullnameOverride: seerr
    image:
      registry: ghcr.io
      repository: seerr-team/seerr
      tag: v3.2.0
    extraEnv:
      - name: TZ
        value: "${TIMEZONE}"
      - name: LOG_LEVEL
        value: info
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        hajimari.io/enable: "true"
        hajimari.io/icon: application
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      hosts:
        - host: &host "requests.k8s.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host
          secretName: seerr-tls
    config:
      persistence:
        # Preserve the existing Overseerr app data during the replacement.
        existingClaim: overseerr
    volumes:
      - name: nas-nfs-movies
        nfs:
          server: 172.16.10.145
          path: /mnt/storage-x/media/plex/Movies
      - name: nfs-nas-tv
        nfs:
          server: 172.16.10.145
          path: /mnt/storage-x/TVShows
    volumeMounts:
      - name: nas-nfs-movies
        mountPath: /movies
      - name: nfs-nas-tv
        mountPath: /tv
    resources:
      requests:
        cpu: 10m
        memory: 250Mi
      limits:
        memory: 500Mi
