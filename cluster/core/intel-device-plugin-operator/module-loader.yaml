---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-module-loader
  namespace: kube-system
  labels:
    app.kubernetes.io/name: intel-gpu-module-loader
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: intel-gpu-module-loader
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intel-gpu-module-loader
    spec:
      hostPID: true
      nodeSelector:
        feature.node.kubernetes.io/cpu-model.id: "158"
        feature.node.kubernetes.io/pci-0300_8086.present: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: module-loader
          image: docker.io/library/alpine:3.20
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -ec
            - |
              chroot /host /usr/sbin/modprobe i915
              while true; do sleep 3600; done
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: false
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
