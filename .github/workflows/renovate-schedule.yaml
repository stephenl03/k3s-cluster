---
name: Schedule - Renovate Helm Releases

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  renovate-helm-releases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare HelmRelease apiVersion for renovate-helm-releases
        run: |
          find ./cluster -path "*/helm-release.yaml" -type f -exec \
            sed -i 's#^apiVersion: helm.toolkit.fluxcd.io/v2$#apiVersion: helm.toolkit.fluxcd.io/v2beta1#' {} +

      - name: Renovate Helm Releases
        uses: allenporter/renovate-helm-releases@v2.0.1
        with:
          cluster-path: "./cluster"

      - name: Restore HelmRelease apiVersion
        run: |
          find ./cluster -path "*/helm-release.yaml" -type f -exec \
            sed -i 's#^apiVersion: helm.toolkit.fluxcd.io/v2beta1$#apiVersion: helm.toolkit.fluxcd.io/v2#' {} +

      - name: Create pull request for renovatebot helm-release annotations
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: renovate-annotations
          delete-branch: true
          title: "chore(deps): update renovate annotations"
          signoff: false
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          commit-message: "chore(deps): update renovate annotations"
          body: |
            Update HelmReleases inorder for Renovate to pick up new versions of Helm charts
          labels: renovate/annotations
